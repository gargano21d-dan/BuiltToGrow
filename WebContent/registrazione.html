<!DOCTYPE html>
<html lang="it">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registrazione - BuiltToGrow</title>
	<link rel="stylesheet" href="styles/tema.css">
	<link rel="stylesheet" href="styles/layout.css">
</head>
<body>

	<header>
		<a href="index.html" class="logo">BuiltToGrow</a>

		<nav>
			<ul>
				<li><a href="catalogo.html">Integrazione</a></li>
				<li><a href="catalogo.html">Vestiario</a></li>
				<li><a href="catalogo.html">Accessori</a></li>
				<li><a href="#">Obiettivi</a></li>
				<li><a href="#">Blog</a></li>
			</ul>
		</nav>

		<div class="azioni-utente">
			<a href="login.html">Accedi</a>
			<a href="carrello.html">Carrello</a>
		</div>
	</header>

	<main class="auth">
		<form class="form-box" action="#" method="post">
			<h1>Crea il tuo account</h1>

			<label for="nome">Nome</label>
			<input type="text" id="nome" name="nome" placeholder="Il tuo nome">

			<label for="email">Email</label>
			<input type="email" id="email" name="email" placeholder="latua@email.com">

			<label for="password">Password</label>
			<input type="password" id="password" name="password" placeholder="Scegli una password">

			<label for="conferma">Conferma password</label>
			<input type="password" id="conferma" name="conferma" placeholder="Ripeti la password">

			<button type="submit" class="btn">Registrati</button>

			<p class="link-registrati">Hai gi&agrave; un account? <a href="login.html">Accedi</a></p>
		</form>
	</main>

	<footer>
		<p>BuiltToGrow &copy; 2026 - Progetto Tecnologie Software per il Web</p>
	</footer>

</body>
</html>
